workflows:
  ios-release:
    name: Ionic iOS App Store Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    integrations:
      app_store_connect: Okkkkk
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.almasria.autoparts
      node: latest
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build Web Assets
        script: |
          npm run build
      - name: Prepare iOS Platform
        script: |
          # مسحنا أمر الـ Pods، هنكتفي بتهيئة المشروع وعمل Sync فقط
          if [ ! -d "ios" ]; then
            echo "⚠️ iOS Platform is missing! Recreating from scratch..."
            npx cap add ios
          fi
          npx cap sync ios
      - name: Build IPA (Xcode Build)
        script: |
          # لو الخطوة دي ضربت برضه وقالت مفيش Workspace،
          # هنغير كلمة workspace ونخليها project وتبقى App.xcodeproj
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
