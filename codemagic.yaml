workflows:
  ios-release:
    name: Ionic iOS App Store Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    integrations:
      app_store_connect: Okkkkk
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.almasria.autoparts
      node: latest
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build Web Assets
        script: |
          npm run build
          # Native TestFlight build must not bundle web service workers.
          # They are web-only and can trigger iOS notification/service-worker flows.
          rm -f dist/sw.js dist/sw-push.js
      - name: Prepare iOS Platform
        script: |
          if [ ! -d "ios" ]; then
            echo "⚠️ iOS Platform is missing! Recreating from scratch..."
            npx cap add ios
          fi
          npx cap sync ios
      - name: Auto-increment Build Number (Auto-pilot)
        script: |
          cd ios/App
          agvtool new-version -all $BUILD_NUMBER
      - name: Set up Code Signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Build IPA (Xcode Build)
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
