workflows:
  ios-release:
    name: Ionic iOS App Store Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    integrations:
      app_store_connect: Okkkkk
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.almasria.autoparts
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build Web Assets
        script: |
          npm run build
      - name: Prepare iOS Platform
        script: |
          # التحقق مما إذا كان مجلد ios أو ملف Podfile غير موجودين وإعادة إنشائهما تلقائياً
          if [ ! -d "ios" ] || [ ! -f "ios/App/Podfile" ]; then
            echo "iOS directory or Podfile is missing. Recreating iOS platform..."
            rm -rf ios
            npx cap add ios
          fi
          npx cap sync ios
      - name: Build IPA (Xcode Build)
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
